<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPU Performance Predictor</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-900">

    <div class="min-h-screen flex items-center justify-center p-6">
        <div class="max-w-4xl w-full bg-white rounded-xl shadow-lg p-8">
            
            <div class="text-center mb-10">
                <h1 class="text-3xl font-bold text-indigo-600">GPU Runtime Predictor</h1>
                <p class="text-gray-500 mt-2">Enter GPU kernel configurations to estimate runtime.</p>
            </div>

            {% if results %}
            <div class="mb-8 p-4 bg-indigo-50 border-l-4 border-indigo-500 rounded-r-lg">
                <p class="text-indigo-700 font-semibold">Predicted Runtime:</p>
                <h2 class="text-4xl font-black text-indigo-900">{{ results }} <span class="text-lg font-normal">ms</span></h2>
            </div>
            {% endif %}

            <form action="{{ url_for('predict_datapoint') }}" method="POST">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700">MWG (Work-group size)</label>
                        <input type="number" step="any" name="MWG" required class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700">NWG (Work-group size)</label>
                        <input type="number" step="any" name="NWG" required class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700">KWG (Work-group size)</label>
                        <input type="number" step="any" name="KWG" required class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700">MDIMC (Local work-group size)</label>
                        <input type="number" step="any" name="MDIMC" required class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700">NDIMC</label>
                        <input type="number" step="any" name="NDIMC" required class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700">MDIMA</label>
                        <input type="number" step="any" name="MDIMA" required class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700">NDIMB</label>
                        <input type="number" step="any" name="NDIMB" required class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700">KWI</label>
                        <input type="number" step="any" name="KWI" required class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700">VWM</label>
                        <input type="number" step="any" name="VWM" required class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700">VWN</label>
                        <input type="number" step="any" name="VWN" required class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700">STRM</label>
                        <input type="number" step="any" name="STRM" required class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700">STRN</label>
                        <input type="number" step="any" name="STRN" required class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700">SA</label>
                        <input type="number" step="any" name="SA" required class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700">SB</label>
                        <input type="number" step="any" name="SB" required class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500">
                    </div>

                </div>

                <div class="mt-10">
                    <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-3 px-4 rounded-md hover:bg-indigo-700 transition duration-200 shadow-md">
                        Predict Runtime
                    </button>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
